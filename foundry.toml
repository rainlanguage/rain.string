[package]
name = "rain-string"
version = "0.2.0"

[profile.default]
libs = ["dependencies"]
# See more config options https://github.com/foundry-rs/foundry/tree/master/config

solc = "0.8.25"
optimizer = true
optimizer_runs = 100000
evm_version = "cancun"

[dependencies]
forge-std = "1.16.1"
"@openzeppelin-contracts" = "5.6.1"
"rain-solmem" = "0.1.3"

[soldeer]
recursive_deps = false
